name: Build StickyInc

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mcp:
    name: MCP server (typecheck + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  build-pane:
    name: Pane (${{ matrix.os }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev \
            build-essential curl wget file

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pane/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pane/src-tauri -> target

      - name: Install pane frontend deps
        working-directory: pane
        run: pnpm install --frozen-lockfile

      # Apple code-signing env is still intentionally absent here — see
      # SIGNING.md. tauri-action treats empty APPLE_CERTIFICATE as "try to
      # sign" and fails importing an empty cert, so we only wire them in
      # after you add those secrets.
      #
      # The updater-signing env vars (TAURI_SIGNING_PRIVATE_KEY*) are
      # safe-if-empty: tauri-action just skips signing the .sig files and
      # latest.json, and the in-app updater falls back to "no manifest"
      # gracefully. So we pass them unconditionally; the updater starts
      # working the moment you add the secret.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: pane
          args: --target ${{ matrix.target }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('StickyInc {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
