name: Build StickyInc

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mcp:
    name: MCP server (typecheck + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  build-pane:
    name: Pane (${{ matrix.os }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev \
            build-essential curl wget file

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pane/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pane/src-tauri -> target

      # The pane's tauri build resolves bundled MCP code via the Tauri
      # `bundle.resources` glob (../../dist/**/*) and runs the root
      # `pnpm -C .. exec tsc` as its beforeBuildCommand, so the root
      # node_modules must be in place before tauri-action runs.
      # `--ignore-scripts` skips better-sqlite3's native rebuild — we only
      # need the TypeScript types here, not the runtime native binary.
      - name: Install MCP root deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install pane frontend deps
        working-directory: pane
        run: pnpm install --frozen-lockfile

      # Apple code-signing env is still intentionally absent here — see
      # SIGNING.md. tauri-action treats empty APPLE_CERTIFICATE as "try to
      # sign" and fails importing an empty cert.
      #
      # Updater signing is opt-in: tauri-action chokes on an empty (vs
      # unset) TAURI_SIGNING_PRIVATE_KEY with "Missing comment in secret
      # key". This step copies the secret into $GITHUB_ENV only when it's
      # non-empty, so absent secrets leave the env var unset and tauri
      # bundles unsigned. Set the two secrets per SIGNING.md → "Releasing
      # with the auto-updater" to flip on signed updater artifacts.
      - name: Configure updater signing
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY<<__STICKY_EOF__"
              printf '%s\n' "$SIGNING_KEY"
              echo "__STICKY_EOF__"
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$SIGNING_PASSWORD"
              echo "STICKYINC_INCLUDE_UPDATER_JSON=true"
            } >> "$GITHUB_ENV"
            echo "updater signing: enabled"
          else
            echo "STICKYINC_INCLUDE_UPDATER_JSON=false" >> "$GITHUB_ENV"
            echo "updater signing: disabled (no TAURI_SIGNING_PRIVATE_KEY secret)"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: pane
          args: --target ${{ matrix.target }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('StickyInc {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: ${{ env.STICKYINC_INCLUDE_UPDATER_JSON == 'true' }}
