<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StickyInc — Quick Add</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: transparent; overflow: hidden; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
        color: #e8e8ed;
      }
      #box {
        position: fixed;
        inset: 0;
        background: rgba(18, 18, 22, 0.94);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 10px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      #box::before {
        content: "＋";
        color: #ff4d4d;
        font-size: 18px;
        font-weight: 600;
      }
      input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: inherit;
        font-size: 15px;
        font-weight: 400;
        padding: 18px 0;
      }
      input::placeholder { color: #6b6b75; }
      #hint {
        font-size: 10px;
        color: #6b6b75;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      #hint kbd {
        background: rgba(255, 255, 255, 0.08);
        padding: 1px 5px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 9px;
      }
      .flash {
        color: #4ade80;
      }
    </style>
  </head>
  <body>
    <div id="box">
      <input id="input" autofocus placeholder="What's sticky? (add  due:2026-04-25  for a date)" />
      <span id="hint"><kbd>⏎</kbd> add · <kbd>esc</kbd> cancel</span>
    </div>
    <script type="module" src="/src/quickadd.ts"></script>
  </body>
</html>
